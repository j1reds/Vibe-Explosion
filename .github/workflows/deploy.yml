name: Deploy to GitHub Pages
# Phase1: CI 成功条件を入れずに、CD 単体を成功させる
# Phase2: CI 成功時のみ CD が走るようにする(jobsのneeds: check有効化)
#         ただしCIとCDが同一ワークフローの場合に needs は使用可能
# Phase3: CI workflow 完了後に CD を実行（workflow_run）

on:
  workflow_run:
    workflows: ["CI"]          # ci.yml の name
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # CI が成功した場合のみ deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
