<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Sound Reactive Circle</title>
  <style>
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
      font-family: sans-serif;
    }

    .circle {
      width: 100px;
      height: 100px;
      background: #6ab4ff;
      border-radius: 50%;
      transition: transform 0.05s linear;
    }
  </style>
</head>
<body>
  <div class="circle"></div>

  <script src="script.js"></script>
</body>
</html>
